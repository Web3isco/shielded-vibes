name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm deps
        run: npm ci
        working-directory: app

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.120 --locked

      - name: Build circuit artifacts
        run: cargo build -p circuits

      - name: Build WASM targets
        run: |
          cargo build -p web --target wasm32-unknown-unknown
          cargo build -p web --target wasm32-unknown-unknown --bin storage-worker
          cargo build -p web --target wasm32-unknown-unknown --bin prover-worker

      - name: Run wasm-bindgen
        run: |
          mkdir -p dist/js
          wasm-bindgen target/wasm32-unknown-unknown/debug/web.wasm \
            --out-dir dist/js --out-name web --target web
          wasm-bindgen target/wasm32-unknown-unknown/debug/storage-worker.wasm \
            --out-dir dist/js --out-name storage-worker --target web
          wasm-bindgen target/wasm32-unknown-unknown/debug/prover-worker.wasm \
            --out-dir dist/js --out-name prover-worker --target web

      - name: Bundle JS with esbuild
        run: |
          ./node_modules/.bin/esbuild js/ui.js \
            --external:./web.js --bundle --outfile=../dist/js/ui.js --format=esm
          ./node_modules/.bin/esbuild js/admin.js \
            --external:./web.js --bundle --outfile=../dist/js/admin.js --format=esm
          ./node_modules/.bin/esbuild js/disclosure.js \
            --external:./web.js --bundle --outfile=../dist/js/disclosure.js --format=esm
        working-directory: app

      - name: Assemble dist
        run: |
          mkdir -p dist/css dist/assets dist/circuits

          # Copy circuit artifacts (needed at runtime for proving)
          cp target/circuits-artifacts/debug/*.r1cs dist/circuits/ 2>/dev/null || true
          cp target/circuits-artifacts/debug/*.wasm dist/circuits/ 2>/dev/null || true

          # Static files
          cp app/css/vibes.css dist/css/vibes.css
          cp app/js/vibes.js dist/js/vibes.js
          cp app/js/sw.js dist/sw.js
          cp -r app/assets/* dist/assets/ 2>/dev/null || true
          cp app/admin.html dist/ 2>/dev/null || true
          cp app/disclosure.html dist/ 2>/dev/null || true

          # Process index.html
          cp app/index.html dist/index.html
          # tailwind-css link → CDN script
          sed -i 's|<link[^>]*rel="tailwind-css"[^>]*/>|<script src="https://cdn.tailwindcss.com"></script>|' dist/index.html
          # vibes.css data-trunk link → regular link
          sed -i 's|<link[^>]*rel="stylesheet"[^>]*href="css/vibes.css"[^>]*/>|<link href="css/vibes.css" rel="stylesheet">|' dist/index.html
          # Remove all rust crate and copy-dir links
          sed -i '/rel="rust"/d' dist/index.html
          sed -i '/rel="copy-dir"/d' dist/index.html
          # Strip data-trunk artifact attributes
          sed -i 's/ data-target-path="[^"]*"//g' dist/index.html
          sed -i 's/ data-integrity="[^"]*"//g' dist/index.html
          sed -i 's/ data-trunk//g' dist/index.html
          # Network name
          sed -i 's|<span id="network-name">Network</span>|<span id="network-name">Testnet</span>|' dist/index.html

          # Prevent GitHub from running Jekyll on the site
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
